//---------------------------------
// Config for css stuff.
// Double slash for comments.
//---------------------------------

// Buy_Binds
bind "KP_END" "buy vesthelm; buy vest" // Numpad 1
bind "KP_DOWNARROW" "buy defuser" // Numpad 2
bind "KP_PGDN" "buy deagle" // Numpad 3
bind "KP_LEFTARROW" "buy ak47; buy m4a1" // Numpad 4
bind "KP_5" "buy awp" // Numpad 5
bind "KP_RIGHTARROW" "buy scout" // Numpad 6
bind "KP_HOME" "buy hegrenade" // Numpad 7
bind "KP_UPARROW" "buy flashbang"	// Numpad 8
bind "KP_PGUP" "buy smokegrenade" // Numpad 9

// Regular Binds
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "h" "toggle cl_righthand 0 1"
bind "mouse4" "say ( ͡° ͜ʖ ͡°)"
bind "mouse5" "+voicerecord"
// bind mouse1 "+attack; r_cleardecals"

// ZE Binds
bind "i" "sm_he"
bind "o" "sm_usp"
bind "p" "sm_deagle"
bind "k" "sm_kevlar"
bind "l" "say !smoke ( ͡° ͜ʖ ͡°)"

bind "z" "slot1; wait 6; drop;sm_tmp; wait 6;slot1"
bind "x" "slot1; wait 6; drop;sm_p90; wait 6;slot1"
bind "c" "slot1; wait 6; drop;sm_m4; wait 6;slot1"
bind "v" "slot1; wait 6; drop;sm_m249; wait 6;slot1"
bind "n" "slot1; wait 6; drop;sm_ump; wait 6;slot1"
bind "j" "slot1; wait 6; drop;sm_ak; wait 6;slot1"

// Alias
alias "!dc" "disconnect"
alias "!q" "quit"
alias "!c" "clear"

// Audio
volume "0.125"
snd_musicvolume "0.15"
voice_scale "1.0"
voice_enable "1"
voice_overdrive "1"

// Mouse
m_rawinput "1"
m_pitch "0.022"
m_filter "0"
m_customaccel "0"
m_mouseaccel1 "0"
m_mouseaccel2 "0"
sensitivity "1.50"

// Network
rate "786432"
cl_interp "0.1"
cl_interp_ratio "1"
cl_lagcompensation "1"
cl_cmdrate "100"
cl_updaterate "100"
cl_predictweapons "1"
cl_allowdownload "1"
cl_allowupload "1"
cl_downloadfilter "all"

// HUD
net_graph "1"
net_graphheight "100"
net_graphmsecs "400"
net_graphpos "2"
net_graphproportionalfont "0"
net_graphshowinterp "1"
net_graphshowlatency "1"
net_graphsolid "1"
net_graphtext "1"
net_scale "5"
hud_fastswitch "1"
cl_showpos "1"

// Crosshair & Radar
cl_radar_locked "1"
cl_dynamiccrosshair "0"
cl_crosshairalpha "255.000000"
cl_crosshairsize "2.420000"
cl_crosshairthickness "0.570000"
cl_crosshaircolor_r "50.000000"
cl_crosshaircolor_g "250.000000"
cl_crosshaircolor_b "50.000000"

// Performance & Graphics
fps_max "450"
mat_vsync "0"
mat_colorcorrection "0"
r_3dsky "1"

