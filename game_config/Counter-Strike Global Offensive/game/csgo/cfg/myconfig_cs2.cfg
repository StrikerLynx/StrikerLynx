//---------------------------------
// Config for cs2 stuff.
// Double slash for comments.
//---------------------------------

// Buy Binds
bind "KP_1" "buy vesthelm" // Numpad 1
bind "KP_2" "buy defuser" // Numpad 2
bind "KP_3" "buy fn57; buy tec9" // Numpad 3
bind "KP_4" "buy ak47; buy m4a1_silencer" // Numpad 4
bind "KP_5" "buy mac10; mp9" // Numpad 5
bind "KP_6" "buy awp" // Numpad 6
bind "KP_7" "buy smokegrenade" // Numpad 7
bind "KP_8" "buy flashbang"	// Numpad 8
bind "KP_9" "buy hegrenade" // Numpad 9

// Regular Binds
bind "alt" "noclip"
bind "capslock" "incrementvar cl_radar_scale 0 1 0.25"
bind "mouse4" "say ( ͡ ͡° ͜ ʖ ͡° )"
bind "f" "+lookatweapon"

// Movement Binds
bind "w" "+forward"
bind "s" "+back"
bind "a" "+left"
bind "d" "+right"
bind "space"  "+jump"
bind ctrl "+duck"
bind shift "+sprint"

// Nade Binds
bind "z" "slot10" 	// Fire
bind "x" "slot7"	// Flash
bind "c" "slot8"	// Smoke
bind "4" "slot6"	// HE

// ZE Binds
bind "z" "c_bizon"
bind "x" "c_m4a4"
bind "c" "c_negev"
bind "v" "c_kevlar"
bind "n" "c_he"
bind "j" "c_ak47"

// Alias
alias "!dc" "disconnect"
alias "!q" "quit"
alias "!c" "clear"

// Volume
volume "0.290"
snd_musicvolume "0.37"
snd_headphone_pan_exponent "1"
snd_voipvolume "2"
bind "mouse5" "+voicerecord"

// Mouse
sensitivity "1.30"
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"

// Video & Network Stuff
fps_max "500"
cl_crosshair_sniper_width "1"
cl_hud_color 4
r_show_build_info "1"
r_fullscreen_gamma "2.0"
rate "786432"

// Rader Stuff
cl_hud_radar_scale "0.7"
cl_radar_always_centered "0"
cl_radar_icon_scale_min "0.4"
cl_radar_rotate "1"
cl_radar_scale "0.4"

// Crosshair
cl_crosshairstyle "5"
cl_crosshairsize "2.0"
cl_crosshairthickness "0.5"
cl_crosshairgap "-2"
cl_crosshair_drawoutline "0"
cl_crosshairdot "0"
cl_crosshair_t "0"
cl_crosshairusealpha "1"
cl_crosshairalpha "255"
cl_crosshair_recoil "0"
cl_crosshairgap_useweaponvalue "0"
cl_crosshaircolor "5"

// Main Viewmodel
viewmodel_fov "68"
viewmodel_presetpos "0"
viewmodel_offset_x "2.5"
viewmodel_offset_y "2"
viewmodel_offset_z "-2"

