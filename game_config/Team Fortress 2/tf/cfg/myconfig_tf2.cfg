//---------------------------------
// Config for tf2 stuff.
// Double slash for comments.
//---------------------------------

// FOV
fov_desired "90"
viewmodel_fov "100"
tf_use_min_viewmodels "1"
r_drawviewmodel "1"

// Binds
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "h" "r_drawviewmodel 0"
bind "j" "r_drawviewmodel 1"

// Alias
alias "!dc" "disconnect"
alias "!q" "quit"
alias "!c" "clear"

// Sens & Audio
m_rawinput "1"
sensitivity "1.25"
volume "0.075"

// Network
rate "786432"
cl_interp "0"
cl_interp_ratio "1"
cl_lagcompensation "1"
cl_cmdrate "128"
cl_updaterate "128"
cl_predictweapons "1"

// Performance
fps_max "500"
mat_vsync "0"