zs_noheavyviewpunch "0"
zs_buymissingscrap "1"
zs_nochargeattack "1"
zs_particleamount "0.000000"
zs_particledistance "0"
zs_particlefilterid "3.000000"
zs_sckworldradius "0"

zs_noironsights "1"
