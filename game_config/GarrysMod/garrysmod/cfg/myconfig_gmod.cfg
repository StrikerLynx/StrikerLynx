// Transparency Bind
bind "mouse5" "incrementvar zs_transparencyradius 0 4000 4000"

// Quick Transparency Toggle Bind
bind "\" "transparency"
alias transparency "zs_transparencyradius 0; zs_transparencyradius3p 1; bind \ "transparency2""
alias transparency2 "zs_transparencyradius 256;zs_transparencyradius3p 128; zs_showfriends 1; bind \ "transparency3""
alias transparency3 "zs_transparencyradius 512; zs_transparencyradius3p 256; zs_showfriends 1; bind \ "transparency4""
alias transparency4 "zs_showfriends 1; bind \ "transparency""