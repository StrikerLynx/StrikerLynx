//---------------------------------
// Config for gmod stuff.
// Double slash for comments.
//---------------------------------

// Binds
bind "mwheelup" "invnext"
bind "mwheeldown" "invprev"
bind "h" "cl_righthand 0"
bind "j" "cl_righthand 1"
bind "mouse4" "zs_quickbuyammo"
bind "k" "say !he"
bind mouse1 "+attack"
bind "x" "+voicerecord"
bind "F7" "zs_spectate"
bind "i" "zs_upgrade"
bind "n" "say ( ͡° ͜ʖ ͡°)"

// Alias
alias "!dc" "disconnect"
alias "!q" "quit"
alias "!c" "clear"

// Audio
volume "0.120"
voice_scale "1.0"
voice_enable "1"
voice_overdrive "1.0"
voice_scale "2"
snd_musicvolume "0.25"

// Mouse
m_rawinput "1"
m_pitch "0.022"
m_filter "0"
m_customaccel "0"
m_mouseaccel1 "0"
m_mouseaccel2 "0"
sensitivity "1.40"

// HUD
